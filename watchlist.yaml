# SF DPH Revenue Integrity - source watchlist (all programs, modular). v1.5
# Toggle a whole program with `enabled:`; run a subset with --programs.
# Entry types: pdf | html | binary | linkpage | bulletin_probe | manual_list
#   expect_shell: true = known client-rendered page; monitored for shell
#                        changes but honestly labeled blind to content.
#   manual: true       = cannot be checked automatically (robots.txt, bot
#                        wall, or broken redirect); reported MANUAL_REVIEW
#                        so a human checks it on a cadence.
#   registry_keys / registry_note = which registry rows to re-verify on
#                        change (v1.5 rename of master_keys / master_note;
#                        the code reads both).
# v1.4 (2026-07-17): pruned 11 low-value entries and the medi_cal_rx
#   program (git history has the configs). Focus is the mcweb per-document
#   manual monitoring: the portal Manuals list with its Revision Date
#   column, each PDF hashed individually with per-page "Page updated"
#   stamps captured. Family PACT first; other manual communities follow
#   the same pattern (see notes/CONTEXT-mcweb.md).
# v1.5 (2026-07-17): master_* keys renamed registry_*.

programs:

  fpact:
    enabled: true
    entries:
      - id: fpact_ppbi_landing
        type: linkpage
        manual: true
        url: https://familypact.org/providers/policies-procedures-and-billing-instructions/
        manual_note: Redirects off-site to the legacy files.medi-cal.ca.gov
          manual-query page, which timed out on 2026-07-02; current PPBI
          sections live on the client-rendered mcweb portal. Detection is
          MCSS + fpact_news_archive; open the PPBI manually when flagged.
        registry_note: ppbi_source_section rows for any changed section

      - id: fpact_news_archive
        type: linkpage
        url: https://familypact.org/news-and-updates-archive/
        link_pattern: 'href="(https://familypact\.org/(?!wp-json|feed|comments)[^"#?]+(?:/|\.pdf))"'
        note: Program news archive; new post or PDF links = policy updates to
          read. Pattern excludes feed/json noise. Also catches re-versioned
          artifacts (e.g. a new Superbill filename).
        registry_note: triage per announcement

      - id: fpact_wic_24005
        type: html
        manual: true
        url: https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=24005.&lawCode=WIC
        manual_note: leginfo robots.txt disallows automated fetch - review
          quarterly by hand. Statute changes arrive via bills, so MCSS and
          program news normally give advance notice.
        registry_note: eligibility / payer-of-last-resort denial rows

      - id: fpact_manual_docs
        type: manual_list
        method: POST
        url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/graphql
        asset_base: "https://mcweb.apps.prd.cammis.medi-cal.ca.gov"
        portal_page: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/manual?community=family-pact
        seed_csv: data/seeds/fpact_manuals_seed_2026-07-16.csv
        # Directus GraphQL. communityId 25 = Family PACT. The aggregate is a
        # truncation tripwire: parsed docs must equal manuals_aggregated.count.
        graphql_body:
          operationName: CommunityManuals
          variables:
            communityId: "25"
          query: >-
            query CommunityManuals($communityId: GraphQLStringOrFloat) {
            manuals(filter: {community: {communities_id: {id: {_eq:
            $communityId}}}}, sort: ["file.filename_download"], limit: -1) { id
            title file { id filename_download modified_on } }
            manuals_aggregated(filter: {community: {communities_id: {id: {_eq:
            $communityId}}}}) { count { id } } }
        # The endpoint needs a Bearer token. It is a STATIC PUBLIC read-only
        # token that mcweb bakes into /environment.js (window.DIRECTUS_TOKEN),
        # served anonymously - not a personal or session credential. Preferred
        # source is the MCWEB_TOKEN secret; if unset or rotated, the watcher
        # self-heals by re-reading token_bundle_url. Never put the literal
        # token in this file.
        auth_header_env: MCWEB_TOKEN
        token_bundle_url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/environment.js
        token_bundle_re: 'window\.DIRECTUS_TOKEN\s*=\s*"([^"]+)"'
        note: Per-document monitor for the entire Family PACT manual list (the
          portal page that shows a Revision Date per section), all 24 sections.
          Backed by the undocumented mcweb Directus GraphQL endpoint (POST
          /graphql, CommunityManuals, communityId 25). Each section is watched
          individually - full PDF text hash (assets are readable with the same
          token, verified 2026-07-16), per-page "Page updated" stamps, portal
          Revision Date (file.modified_on, compared as a raw string), new docs
          auto-discovered, removals flagged - and CHANGED sections get a
          before/after text diff in reports/diffs/. If the token ever grants
          the list but not the assets, the entry degrades to
          CHANGED_METADATA_ONLY (revision-date + file.id churn, no text diff)
          instead of going blind. This is an undocumented internal endpoint
          that can change shape or auth without notice; MCSS email remains the
          backstop detector and must not be retired on the strength of this
          integration. Decision support, not a source of record.
        registry_note: ppbi_source_section rows for any changed section

      - id: fpact_bulletin_probe
        type: bulletin_probe
        url_template: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/bulletin?community=family-pact&issueNumber={issue}
        seed_issue: 223
        probe_count: 3
        note: Best-effort probe; portal is client-rendered so expect
          PROBE_INCONCLUSIVE - MCSS email is the reliable detector.

  medi_cal_ffs:
    enabled: true
    entries:
      - id: ffs_tri_page
        type: linkpage
        url: https://www.dhcs.ca.gov/medi-cal-targeted-provider-rate-increases-and-investments/
        link_pattern: 'href="([^"]+\.(?:pdf|xlsx)[^"]*)"'
        note: TRI landing; link-set diff catches re-versioned fee schedule
          filenames and new APL redlines. Heads-up for readers - the fee
          schedule links on this page are direct .xlsx downloads (clicking
          one downloads an Excel file rather than opening a page).
        registry_note: reimbursement_basis rows citing TRI / SB 94

      - id: ffs_sb94_fp_fee_schedule
        type: binary
        url: https://www.dhcs.ca.gov/wp-content/uploads/2025/10/SB94-Family-Planning-Services-Fee-Schedule.xlsx
        note: SB 94 family-planning augmented fee schedule (supersedes TRI
          for FP codes with Z30.x). Versioned filename - a replacement
          appears via ffs_tri_page. The URL is a direct .xlsx download;
          prefer opening the TRI landing page and downloading from there.
        registry_note: FPACT rows priced on the SB 94 schedule

      - id: ffs_wic_14105_201
        type: html
        manual: true
        url: https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=14105.201.&lawCode=WIC
        manual_note: leginfo robots.txt disallows automated fetch - review
          quarterly by hand.

  managed_medi_cal:
    enabled: true
    entries:
      - id: mcp_apl_index
        type: linkpage
        url: https://www.dhcs.ca.gov/formsandpubs/Pages/AllPlanLetters.aspx
        link_pattern: 'href="([^"]+\.pdf[^"]*)"'
        note: Kept provisionally (2026-07-17 review). First run matched zero
          links with the APL-specific pattern - broadened to all PDFs; text
          hash still covers page changes. If the link list stays empty,
          capture the real APL listing URL from the browser and repoint.

      - id: mcp_boilerplate_contract
        type: pdf
        url: https://www.dhcs.ca.gov/hi/wp-content/uploads/2025/10/2024-Managed-Care-Boilerplate-Contract.pdf
        note: Hard-dated versioned filename (2025/10 upload path) - a
          revision likely ships under a new URL, which this entry alone
          cannot see. Treat as a point-in-time watch.

      - id: mcp_tri_faq
        type: pdf
        url: https://www.dhcs.ca.gov/services/Documents/DirectedPymts/CY-2024-TRI-FAQ-20250312.pdf
        note: Hard-dated versioned filename (20250312) - a revision likely
          ships under a new URL; ffs_tri_page link-set diffing is the
          catcher for replacements. 2026-07-17 - this URL intermittently
          answers 200 with a small HTML bot-check page instead of the PDF;
          the checker reports that honestly as UNREACHABLE and keeps the
          last good baseline.

  fqhc:
    enabled: true
    entries:
      - id: fqhc_wic_14132_100
        type: html
        manual: true
        url: https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=14132.100.&lawCode=WIC
        manual_note: leginfo robots.txt disallows automated fetch. ACTION -
          AB 116 amendment took effect 2026-07-01; manually verify the
          amended provider list and update the fqhc-billing reference.
        registry_note: PPS-billable provider list in fqhc-billing reference

      - id: fqhc_cms_center
        type: html
        url: https://www.cms.gov/medicare/payment/prospective-payment-systems/federally-qualified-health-centers-fqhc-center
        note: G2025 rate, care-management code set, telehealth expiries.

      - id: fqhc_ecfr_405_subpart_x
        type: html
        manual: true
        url: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-405/subpart-X
        manual_note: eCFR bot wall redirects automated fetches off-host.
          eCFR publishes an official public API for exactly this use (see
          ecfr.gov developer documentation) - switching this entry to the
          API endpoint for Title 42 Part 405 is the planned fix; until then
          review by hand when CMS guidance changes.

      - id: fqhc_dhcs_3097_page
        type: html
        url: https://www.dhcs.ca.gov/forms-laws-publications/forms/cost-report-forms-and-documents/
        note: Wrap reconciliation forms and due-date extensions.

      - id: fqhc_rural_manual_docs
        type: manual_list
        method: POST
        url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/graphql
        asset_base: "https://mcweb.apps.prd.cammis.medi-cal.ca.gov"
        portal_page: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/manual?community=clinics-and-hospitals
        seed_csv: data/seeds/fqhc_rural_manuals_seed_2026-07-17.csv
        # Filtered manual_list (2026-07-17): the RHC/FQHC manual is not its
        # own community on mcweb - the rural* sections live inside Clinics
        # and Hospitals (communityId 11, 246 docs - far too many to watch
        # whole). This filters to filenames starting "rural": rural.pdf
        # (overview), ruralcd.pdf (BILLING CODES), ruralex.pdf (billing
        # examples), ruralhosp.pdf (swing bed). Same endpoint, token
        # self-heal, and truncation tripwire as fpact_manual_docs. The old
        # ?community=rural page this replaced was never a valid slug (the
        # SPA slugifies community names; verified against the full
        # communities list, notes/CONTEXT-mcweb.md).
        graphql_body:
          operationName: RuralManuals
          query: >-
            query RuralManuals { manuals(filter: {file: {filename_download:
            {_starts_with: "rural"}}}, sort: ["file.filename_download"],
            limit: -1) { id title file { id filename_download modified_on } }
            manuals_aggregated(filter: {file: {filename_download:
            {_starts_with: "rural"}}}) { count { id } } }
        auth_header_env: MCWEB_TOKEN
        token_bundle_url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/environment.js
        token_bundle_re: 'window\.DIRECTUS_TOKEN\s*=\s*"([^"]+)"'
        note: Per-document monitor for the four RHC/FQHC manual sections
          (rural, ruralcd billing codes, ruralex billing examples, ruralhosp
          swing bed) - full PDF text hash, per-page "Page updated" stamps,
          portal Revision Date, diffs on change. rural.pdf was revised
          2026-07-16, the day before this entry was added. MCSS RHC/FQHC
          email remains the backstop detector.
        registry_note: fqhc-billing reference rows; PPS / wrap / per-visit
          code rows on change

  # Lower-priority date-only watch (type revision_watch): queries each
  # community's manual list metadata (no PDF downloads - light even at
  # 246 sections) and raises a REVISION_NOTICE naming the sections whose
  # portal Revision Date moved. Full text monitoring for these stays a
  # deliberate non-goal until a community earns it (convert to a filtered
  # manual_list like fqhc_rural_manual_docs). Community ids come from the
  # catalog in notes/CONTEXT-mcweb.md.
  revision_notices:
    enabled: true
    entries:
      - id: rev_inpatient_manuals
        type: revision_watch
        url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/graphql
        portal_page: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/manual?community=inpatient-services
        community_id: "9"
        auth_header_env: MCWEB_TOKEN
        token_bundle_url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/environment.js
        token_bundle_re: 'window\.DIRECTUS_TOKEN\s*=\s*"([^"]+)"'
        note: Inpatient Services manual, ~115 sections. Date-only signal
          for inpatient billing / revenue integrity awareness.
        registry_note: inpatient billing rows on related section changes

      - id: rev_clinics_hospitals_manuals
        type: revision_watch
        url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/graphql
        portal_page: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/manual?community=clinics-and-hospitals
        community_id: "11"
        auth_header_env: MCWEB_TOKEN
        token_bundle_url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/environment.js
        token_bundle_re: 'window\.DIRECTUS_TOKEN\s*=\s*"([^"]+)"'
        note: Clinics and Hospitals manual, ~246 sections (includes the
          rural* RHC/FQHC sections that fqhc_rural_manual_docs monitors in
          full - a notice here plus a quiet fqhc row means the movement was
          outside the rural sections).
        registry_note: outpatient clinic / hospital billing rows on related
          section changes

      - id: rev_general_medicine_manuals
        type: revision_watch
        url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/graphql
        portal_page: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/publications/manual?community=general-medicine
        community_id: "21"
        auth_header_env: MCWEB_TOKEN
        token_bundle_url: https://mcweb.apps.prd.cammis.medi-cal.ca.gov/environment.js
        token_bundle_re: 'window\.DIRECTUS_TOKEN\s*=\s*"([^"]+)"'
        note: General Medicine manual, ~229 sections - E&M, telehealth,
          preventive services and other chargemaster-relevant policy.
        registry_note: professional-services billing rows on related
          section changes

  ncci:
    enabled: true
    entries:
      - id: ncci_medicaid_files
        type: linkpage
        url: https://www.cms.gov/medicare/coding-billing/ncci-medicaid/medicaid-ncci-edit-files
        link_pattern: 'href="([^"]+\.(?:zip|xlsx)[^"]*)"'
        note: Quarterly PTP/MUE file drops appear as new links (first run
          captured the 2026 Q3 set effective 07/01/2026). File links are
          direct downloads (.zip/.xlsx).
